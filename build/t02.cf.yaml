AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Wiki Bot Serverless Application - IL Central 1

Parameters:
  BucketCodeName:
    Description: The name of code bucket.
    Type: String
  DistCodeVersionId:
    Type: String
  WikiUserName:
    Description: The name of wiki user.
    Type: String
  WikiPassword:
    Description: The password of wiki user.
    Type: String
  WikiBaseUrl:
    Description: The base URL of the wiki.
    Type: String
  WikiBotName:
    Description: The name of the wiki bot.
    Type: String

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 900
    MemorySize: 1024
    CodeUri:
      Bucket: !Ref BucketCodeName
      Key: dist.zip
      Version: !Ref DistCodeVersionId
    DeadLetterQueue:
      Type: SQS
      TargetArn: !GetAtt GeneralDlqQueue.Arn
    Environment:
      Variables:
        USER_NAME: !Ref WikiUserName
        PASSWORD: !Ref WikiPassword
        BASE_URL: !Ref WikiBaseUrl
        BOT_NAME: !Ref WikiBotName

Resources:
  KineretLevelFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: Kineret-level-function
      Handler: dist/kineret/index.main
      Timeout: 20
      MemorySize: 512
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 5,10,15,20 ? * * *)
            Name: Kineret-level-scheduler

  GeneralDlqQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: wiki-bot-dlq
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600

  GeneralDlqProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: wiki-bot-dlq-logger
      Handler: dist/dlq/index.main
      Timeout: 60
      MemorySize: 512
      Events:
        DLQEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt GeneralDlqQueue.Arn
            BatchSize: 1
